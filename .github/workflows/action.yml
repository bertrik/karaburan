name: ROS2 Jazzy Build
on: push

permissions:
  contents: read

jobs:
  jazzy_build:
    runs-on: ubuntu-latest
    env:
      PIP_BREAK_SYSTEM_PACKAGES: '1'
    container:
      image: ubuntu:noble
    steps:
      - uses: actions/checkout@v4
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install support for pip-based rosdep rules
        run: |
          apt-get update
          apt-get install --no-install-recommends --yes python3-pip
      - name: Register project rosdep rules
        run: |
          echo "yaml file://${GITHUB_WORKSPACE}/.github/rosdep/karaburan.yaml" \
            > /etc/ros/rosdep/sources.list.d/50-karaburan.list
          rosdep update
      - uses: ros-tooling/action-ros-ci@v0.3
        with:
          package-name: >-
            karaburan_msgs
            boatcontrol
            navigation
            tempreader
            lidar
            sonar
            vl53l0x
            bt785
          target-ros2-distro: jazzy
